<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; display: flex; gap: 20px; padding: 20px; background: #0f172a; }
    canvas { border: 1px solid #334155; }
  </style>
</head>
<body>
  <canvas id="c192" width="192" height="192"></canvas>
  <canvas id="c512" width="512" height="512"></canvas>
  <script>
    function drawIcon(canvas, size) {
      const ctx = canvas.getContext('2d');
      const center = size / 2;
      
      // 背景
      const grad = ctx.createLinearGradient(0, 0, size, size);
      grad.addColorStop(0, '#0ea5e9');
      grad.addColorStop(1, '#10b981');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(0, 0, size, size, size * 0.2);
      ctx.fill();
      
      // 眼睛形状
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = size * 0.06;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.ellipse(center, center, size * 0.35, size * 0.22, 0, 0, Math.PI * 2);
      ctx.stroke();
      
      // 瞳孔
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(center, center, size * 0.1, 0, Math.PI * 2);
      ctx.fill();
      
      // 眨眼弧线
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = size * 0.04;
      ctx.beginPath();
      ctx.arc(center, center - size * 0.05, size * 0.25, Math.PI * 0.8, Math.PI * 0.2);
      ctx.stroke();
    }
    
    drawIcon(document.getElementById('c192'), 192);
    drawIcon(document.getElementById('c512'), 512);
  </script>
</body>
</html>
